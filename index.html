function initCompass() {
    state.emotion = document.getElementById('emotionInput').value;
    state.gIdx = 0; state.sIdx = 0; state.hPage = 0;
    updateUI();
}

function rotate(type) {
    const item = db[state.emotion];
    if(type === 'gita') state.gIdx = (state.gIdx + 1) % item.g.length;
    if(type === 'stoic') state.sIdx = (state.sIdx + 1) % item.s.length;
    updateUI();
}

function toggleHabits() {
    state.hPage = state.hPage === 0 ? 1 : 0;
    updateUI();
}

function updateUI() {
    const item = db[state.emotion];
    if(!item) return;
    document.getElementById('gt').innerText = item.g[state.gIdx][0];
    document.getElementById('gr').innerText = "— Verse " + item.g[state.gIdx][1];
    document.getElementById('st').innerText = item.s[state.sIdx][0] || item.s[state.sIdx];
    document.getElementById('sr').innerText = "— Stoic Logic";
    const list = document.getElementById('habitsList');
    list.innerHTML = "";
    const start = state.hPage * 5;
    item.h.slice(start, start + 5).forEach((h, i) => {
        list.innerHTML += `<div class="habit-item"><div class="badge">${start+i+1}</div><div class="h-content"><b>${h[0]}</b><p>${h[1]}</p></div></div>`;
    });
    document.getElementById('habitLabel').innerText = `Habits (${start+1}-${start+5})`;
    document.getElementById('pageBtn').innerText = state.hPage === 0 ? "NEXT 5 ACTIONS →" : "PREVIOUS 5 ACTIONS ←";
    document.getElementById('dashboard').style.display = 'block';
    window.scrollTo({ top: 350, behavior: 'smooth' });
}

function openAnchor(type) {
    const anchors = {
        present: ["Root in the Now", "Yesterday is a memory; tomorrow is a projection. Only this breath and your current action are real. Drop the story. Return to the task."],
        gratitude: ["Universal Gratitude", "I am grateful for Isha and Aryan. I am grateful for the chance to build. I have enough."],
        prayer: ["The Instrument's Prayer", "I am but an instrument. I offer my work to the Divine. Let my actions be pure and results be Yours."],
        faith: ["Faith in the Design", "Everything is unfolding as it should. I am protected, guided, and exactly where I need to be."]
    };
    document.getElementById('mT').innerText = anchors[type][0];
    document.getElementById('mB').innerText = anchors[type][1];
    document.getElementById('modal').style.display = 'block';
}

function toggleBreathe() {
    document.getElementById('breatheOverlay').style.display = 'block';
    const text = document.getElementById('breatheText');
    let stateVal = 0;
    const interval = setInterval(() => {
        if (document.getElementById('breatheOverlay').style.display === 'none') {
            clearInterval(interval); return;
        }
        text.innerText = stateVal % 2 === 0 ? "Exhale..." : "Inhale...";
        stateVal++;
    }, 4000);
}

(function init() {
    const day = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
    document.getElementById('dailyThought').innerText = thoughtPool[day % thoughtPool.length];
})();
</script>
