function initCompass() {
    state.emotion = document.getElementById('emotionInput').value;
    state.gIdx = Math.floor(Math.random() * 3);
    state.sIdx = Math.floor(Math.random() * 3);
    state.hPage = 0;
    updateUI();
}

function rotate(type) {
    if(type === 'gita') state.gIdx = (state.gIdx + 1) % 3;
    if(type === 'stoic') state.sIdx = (state.sIdx + 1) % 3;
    updateUI();
}

function toggleHabits() {
    state.hPage = state.hPage === 0 ? 1 : 0;
    updateUI();
}

    if(!item) return;
    document.getElementById('gt').innerText = item.g[state.gIdx][0];
    document.getElementById('gr').innerText = "— Verse " + item.g[state.gIdx][1];
    document.getElementById('st').innerText = item.s[state.sIdx][0] || item.s[state.sIdx];
    document.getElementById('sr').innerText = "— Stoic Logic";
    const list = document.getElementById('habitsList');
    list.innerHTML = "";
    const start = state.hPage * 5;
    item.h.slice(start, start + 5).forEach((h, i) => {
        list.innerHTML += `<div class="habit-item"><div class="badge">${start+i+1}</div><div class="h-content"><b>${h[0]}</b><p>${h[1]}</p></div></div>`;
    });
    document.getElementById('habitLabel').innerText = `Habits (${start+1}-${start+5})`;
    document.getElementById('pageBtn').innerText = state.hPage === 0 ? "NEXT 5 ACTIONS →" : "PREVIOUS 5 ACTIONS ←";
    document.getElementById('dashboard').style.display = 'block';
    window.scrollTo({ top: 300, behavior: 'smooth' });
}

function openAnchor(type) {
    const anchors = {
        gratitude: ["Gratitude", "I am grateful for Isha and Aryan. I am grateful for the chance to build. I have enough."],
        prayer: ["Prayer", "I am but an instrument. I offer my work to the Divine. Guide my mind."],
        faith: ["Faith", "Everything is unfolding as it should. I am protected and guided."]
    };
    document.getElementById('mT').innerText = anchors[type][0];
    document.getElementById('mB').innerText = anchors[type][1];
    document.getElementById('modal').style.display = 'block';
}

(function init() {
    const day = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
    document.getElementById('dailyThought').innerText = thoughtPool[day % thoughtPool.length];
})();
</script>
